spring:
  application:
    name: qaas-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/qaas}
    username: ${SPRING_DATASOURCE_USERNAME:qaas}
    password: ${SPRING_DATASOURCE_PASSWORD:qaas}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}

qaas:
  jwt:
    secret: ${QAAS_JWT_SECRET:change-this-secret-to-at-least-32-characters}
    access-token-minutes: ${QAAS_ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${QAAS_REFRESH_TOKEN_DAYS:14}
  cors:
    allowed-origins: ${QAAS_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
