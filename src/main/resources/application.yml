spring:
  application:
    name: qaas-api
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/qaas}
    username: ${SPRING_DATASOURCE_USERNAME:qaas}
    password: ${SPRING_DATASOURCE_PASSWORD:qaas}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${QAAS_MAIL_HOST:localhost}
    port: ${QAAS_MAIL_PORT:587}
    username: ${QAAS_MAIL_USERNAME:}
    password: ${QAAS_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8090}

qaas:
  jwt:
    secret: ${QAAS_JWT_SECRET:change-this-secret-to-at-least-32-characters}
    access-token-minutes: ${QAAS_ACCESS_TOKEN_MINUTES:30}
    refresh-token-days: ${QAAS_REFRESH_TOKEN_DAYS:14}
  cors:
    allowed-origins: ${QAAS_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
  mail:
    enabled: ${QAAS_MAIL_ENABLED:false}
    from: ${QAAS_MAIL_FROM:noreply@qaas.local}

springdoc:
  swagger-ui:
    path: /swagger-ui.html