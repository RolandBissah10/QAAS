services:
  postgres:
    image: postgres:16-alpine
    container_name: qaas-postgres
    environment:
      POSTGRES_DB: qaas
      POSTGRES_USER: qaas
      POSTGRES_PASSWORD: qaas
    ports:
      - "5432:5432"
    volumes:
      - qaas-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qaas -d qaas"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: qaas-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qaas
      SPRING_DATASOURCE_USERNAME: qaas
      SPRING_DATASOURCE_PASSWORD: qaas
      QAAS_JWT_SECRET: change-this-secret-to-at-least-32-characters
      QAAS_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      PORT: 8090
      QAAS_MAIL_ENABLED: "true"
      QAAS_MAIL_HOST: smtp.gmail.com
      QAAS_MAIL_PORT: "587"
      QAAS_MAIL_USERNAME: rolandbissah10@gmail.com
      QAAS_MAIL_PASSWORD: agmgtppcfkiwwfbs
      QAAS_MAIL_FROM: rolandbissah10@gmail.com
      SCREENSHOT_DIR: /app/screenshots
      REPORT_DIR: /app/reports
    ports:
      - "8090:8090"
    volumes:
      - qaas-screenshots:/app/screenshots
      - qaas-reports:/app/reports

volumes:
  qaas-postgres-data:
  qaas-screenshots:
  qaas-reports:
